<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finance Tools{% endblock %}</title>

    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons 1.11.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>

    <!-- Sidebar -->
    {% include 'partials/navbar.html' %}

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="topbar">
            <button class="btn sidebar-toggle d-lg-none" id="sidebarToggle" aria-label="Toggle navigation">
                <i class="bi bi-list fs-5"></i>
            </button>
            <span class="topbar-breadcrumb">{% block breadcrumb %}Finance Tools{% endblock %}</span>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Bootstrap 5.3.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmgR7NkBFDdbIFHdJ7OB3P/F3yv" crossorigin="anonymous"></script>

    <!-- Shared Utilities -->
    <script src="/static/js/utils.js"></script>

    <!-- Sidebar active state + mobile toggle -->
    <script>
      (function() {
        var path = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.sidebar-nav .nav-link').forEach(function(link) {
          var href = (link.getAttribute('href') || '').split('/').pop();
          if (href === path) link.classList.add('active');
        });

        var toggle = document.getElementById('sidebarToggle');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebarOverlay');
        if (toggle && sidebar && overlay) {
          toggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
          });
          overlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
          });
        }
      })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
